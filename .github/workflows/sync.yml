name: Bulk Add and Release
on: 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Register and Add Submodules
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "Mod Bot"
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

          while IFS= read -r url || [ -n "$url" ]; do
            if [ -n "$url" ]; then
              url=$(echo "$url" | tr -d '\r' | xargs)
              folder_name=$(basename "$url" .git)
              if [ ! -d "$folder_name" ]; then
                git submodule add "$url" "$folder_name"
              fi
            fi
          done < mods.txt
          
          # Initialize and pull the actual code into the folders
          git submodule update --init --recursive

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Robot: Updated submodules"
            git push
          fi

      - name: Create Full ZIP
        run: |
          # Zip everything except the .git folders to keep it clean
          zip -r full_modset.zip . -x "*.git*" ".github*" "mods.txt"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Full Modset Update #${{ github.run_number }}"
          files: full_modset.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
