name: Bulk Add Submodules
on: 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Register and Add Submodules
        run: |
          # 1. Setup Bot Identity
          git config --global user.email "bot@github.com"
          git config --global user.name "Mod Bot"

          # 2. Read each line in mods.txt and 'add' it
          while IFS= read -r url || [ -n "$url" ]; do
            if [ -n "$url" ]; then
              folder_name=$(basename "$url" .git)
              echo "Processing $folder_name..."
              
              # Only add if the folder doesn't exist yet
              if [ ! -d "$folder_name" ]; then
                git submodule add "$url" "$folder_name"
              fi
            fi
          done < mods.txt

          # 3. Commit the new 'pointers'
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Robot: Bulk added mods from mods.txt"
            git push
          else
            echo "Everything is already up to date."
          fi
